name: Publish

on:
  push:
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
      - 'docker-bake.hcl'
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:

  Test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .github/tests/
    env:
      BUILDKIT_PROGRESS: plain
    steps:
        - name: checkout
          uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

        - name: Start Containers
          run: docker compose up --detach --build

        - name: Run tests
          run: dig @localhost -p 1053 google.com

        - name: Check metrics
          run: |
            curl -s http://localhost:9167/metrics | grep unbound
            curl -s http://localhost:9167/_healthz | grep -q "ok"

        - name: Stop containers
          if: always()
          run: docker compose down

  Publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:

      - name: Login to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login To GitHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: cyb3rjak3/unbound-exporter,ghcr.io/cyb3r-jak3/unbound-exporter,mine.jfrog.cyberjake.xyz/cyb3rjak3/unbound-exporter
          labels: |
            org.label-schema.vcs-url=https://github.com/Cyb3r-Jak3/docker-unbound-exporter.git
            maintainer=Cyb3r Jak3 git@cyberjake.xyz
            org.opencontainers.image.vendor=cyb3rjak3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build
        id: build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          files: |
            ${{ steps.meta.outputs.bake-file }}
            ./docker-bake.hcl
          targets: release
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          provenance: ${{ startsWith(github.ref, 'refs/tags/v') }}
          sbom: ${{ startsWith(github.ref, 'refs/tags/v') }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  PostPublish:
    runs-on: ubuntu-latest
    name: Post-Publish Tasks
    needs: Publish
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: cyb3rjak3/unbound-exporter

      - name: Extract image digest
        id: digest
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          version="${{ needs.Publish.outputs.version }}"
          version="${version#v}"
          image_ref="ghcr.io/cyb3r-jak3/unbound-exporter:${version}"
          digest=""

          # Registry metadata can lag briefly after push, so retry before failing.
          for i in {1..10}; do
            digest=$(docker buildx imagetools inspect "$image_ref" | awk '/^Digest:/ {print $2; exit}')
            if [ -n "$digest" ]; then
              break
            fi
            echo "Digest not available yet for $image_ref (attempt $i/10), retrying..."
            sleep 6
          done

          if [ -z "$digest" ]; then
            echo "Failed to resolve digest for $image_ref"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: $digest"

      - name: GitHub Container Attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        id: attest
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        with:
          subject-name: ghcr.io/cyb3r-jak3/unbound-exporter
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
